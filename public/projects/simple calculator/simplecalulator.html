<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glass Calculator</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #141E30, #243B55);
    font-family: 'Poppins', sans-serif;
  }

  .calculator {
    width: 320px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.18);
  }

  .window-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .window-buttons span {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    display: inline-block;
  }
  .red { background: #ff5f57; }
  .yellow { background: #ffbd2e; }
  .green { background: #28c840; }

  .display {
    width: 100%;
    height: 70px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    margin-bottom: 20px;
    text-align: right;
    padding: 10px;
    font-size: 1.8rem;
    color: #fff;
    box-sizing: border-box;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  button {
    border: none;
    outline: none;
    padding: 15px;
    font-size: 1.1rem;
    border-radius: 30px;
    color: #fff;
    background: rgba(255, 255, 255, 0.2);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: scale(1.05);
  }

  .operator {
    background: rgba(255, 255, 255, 0.25);
    color: #00ffcc;
  }

  .equal {
    grid-column: span 2;
    background: rgba(0, 255, 204, 0.7);
    color: #000;
    font-weight: bold;
  }

  .zero {
    grid-column: span 2;
  }
</style>
</head>
<body>

  <div class="calculator">
    <div class="window-buttons">
      <span class="red"></span>
      <span class="yellow"></span>
      <span class="green"></span>
    </div>

    <div class="display" id="display">0</div>

    <div class="buttons">
      <button onclick="clearEntry()">C</button>
      <button onclick="clearAll()">AC</button>
      <button onclick="appendSymbol('%')" class="operator">%</button>
      <button onclick="appendSymbol('/')" class="operator">/</button>

      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button onclick="appendSymbol('*')" class="operator">×</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button onclick="appendSymbol('-')" class="operator">−</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button onclick="appendSymbol('+')" class="operator">+</button>

      <button class="zero" onclick="appendNumber('0')">0</button>
      <button onclick="appendDot()">.</button>
      <button onclick="calculateResult()" class="equal">=</button>
    </div>
  </div>

<script>
  let display = document.getElementById("display");
  let currentInput = "";

  function updateDisplay() {
    display.textContent = currentInput || "0";
  }

  function appendNumber(num) {
    currentInput += num;
    updateDisplay();
  }

  function appendSymbol(symbol) {
    if (currentInput === "") return;
    currentInput += symbol;
    updateDisplay();
  }

  function appendDot() {
    const parts = currentInput.split(/[\+\-\*\/]/);
    const last = parts[parts.length - 1];
    if (!last.includes(".")) {
      currentInput += ".";
      updateDisplay();
    }
  }

  function clearEntry() {
    currentInput = currentInput.slice(0, -1);
    updateDisplay();
  }

  function clearAll() {
    currentInput = "";
    updateDisplay();
  }

  function calculateResult() {
    try {
      let result = Function(`"use strict";return (${currentInput})`)();
      currentInput = result.toString();
    } catch {
      currentInput = "Error";
    }
    updateDisplay();
  }
</script>

</body>
</html>
